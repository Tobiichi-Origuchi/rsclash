[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"
unused-ignored-advisory = "deny"
ignore = [
  { id = "RUSTSEC-2026-0194", reason = "quick-xml is build-only through wayland-scanner and parses trusted bundled protocol XML" },
  { id = "RUSTSEC-2026-0195", reason = "quick-xml is build-only through wayland-scanner and parses trusted bundled protocol XML" },
]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "warn"
unused-license-exception = "deny"
exceptions = [
  { name = "epaint_default_fonts", allow = ["OFL-1.1", "Ubuntu-font-1.0"] },
  { name = "webpki-root-certs", allow = ["CDLA-Permissive-2.0"] },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = false
unused = "deny"

[[bans.features]]
crate = "eframe"
deny = ["accesskit", "wgpu", "wgpu_no_default_features"]

[[bans.features]]
crate = "ksni"
deny = ["async-io", "blocking"]

[[bans.features]]
crate = "tracing-subscriber"
deny = ["ansi"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
