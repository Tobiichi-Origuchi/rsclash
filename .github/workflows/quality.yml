name: Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  msrv:
    name: Rust 1.92 quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            shellcheck

      - name: Install Rust 1.92
        run: |
          rustup toolchain install 1.92.0 \
            --profile minimal \
            --component clippy \
            --component rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-1.92

      - name: Install repository tools
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: taplo-cli@0.10.0,cargo-deny@0.20.2
          fallback: none

      - name: Install actionlint 1.7.10
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/rhysd/actionlint/releases/download/v1.7.10/actionlint_1.7.10_linux_amd64.tar.gz \
            --output /tmp/actionlint.tar.gz
          echo "f4c76b71db5755a713e6055cbb0857ed07e103e028bda117817660ebadb4386f  /tmp/actionlint.tar.gz" \
            | sha256sum --check --status
          tar --extract --gzip --file /tmp/actionlint.tar.gz \
            --directory "${CARGO_HOME}/bin" actionlint

      - name: Run complete quality gate
        run: ./scripts/check.sh

  stable:
    name: Latest stable compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install latest stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-stable

      - name: Check latest stable compatibility
        run: cargo +stable check --locked --workspace --all-targets --all-features

      - name: Lint with latest stable Clippy
        run: cargo +stable clippy --locked --workspace --all-targets --all-features

      - name: Test with latest stable Rust
        run: cargo +stable test --locked --workspace --all-targets --all-features

      - name: Reject latest stable rustdoc warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +stable doc --locked --workspace --all-features --no-deps

  mihomo-integration:
    name: Pinned Mihomo integration
    needs: msrv
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust 1.92
        run: rustup toolchain install 1.92.0 --profile minimal

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-1.92

      - name: Test against pinned Mihomo
        run: ./scripts/test-mihomo-integration.sh
