[workspace]
members = [
    "apps/rsclash-desktop",
    "crates/rsclash-app",
    "crates/rsclash-domain",
    "crates/rsclash-ui",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
publish = false

[workspace.dependencies]
eframe = { version = "0.35.0", default-features = false, features = [
    "accesskit",
    "default_fonts",
    "persistence",
    "wayland",
    "x11",
] }
egui = { version = "0.35.0", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.53.1", features = [
    "macros",
    "rt-multi-thread",
    "sync",
    "time",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
tray-icon = { version = "0.24.1", default-features = false, features = ["gtk"] }

rsclash-app = { path = "crates/rsclash-app" }
rsclash-domain = { path = "crates/rsclash-domain" }
rsclash-ui = { path = "crates/rsclash-ui" }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
dbg_macro = "deny"
expect_used = "deny"
todo = "deny"
unwrap_used = "deny"

[profile.release]
codegen-units = 1
lto = "thin"
opt-level = 3
panic = "unwind"
strip = "symbols"
